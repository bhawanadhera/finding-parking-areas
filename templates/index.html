<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartParking</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --green: #1D9E75;
      --green-dark: #085041;
      --green-mid: #0d6b52;
      --green-light: #E1F5EE;
      --amber: #EF9F27;
      --amber-light: #FFF3DC;
      --red: #e53e3e;
      --bg: #f0f4f1;
      --card: #ffffff;
      --text: #1a1a18;
      --muted: #6b6b67;
      --border: #e4e8e5;
    }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    /* ============================
       HOME SCREEN
    ============================ */

    #screen-home {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      background: linear-gradient(160deg, #063d30 0%, #085041 40%, #0d6b52 75%, #1a4a3a 100%);
      position: relative;
      overflow: hidden;
    }

    /* decorative background circles */
    #screen-home::before {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.05);
      top: -100px;
      right: -100px;
      pointer-events: none;
    }

    #screen-home::after {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: rgba(239, 159, 39, 0.06);
      bottom: -80px;
      left: -80px;
      pointer-events: none;
    }

    .home-logo {
      width: 64px;
      height: 64px;
      background: var(--amber);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin-bottom: 20px;
      box-shadow: 0 8px 24px rgba(239,159,39,0.35);
      animation: floatLogo 3s ease-in-out infinite;
    }

    @keyframes floatLogo {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .home-brand {
      font-size: 40px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -1px;
    }

    .home-brand span {
      color: var(--amber);
    }

    .home-sub {
      margin-top: 10px;
      color: rgba(255,255,255,0.6);
      font-size: 15px;
      text-align: center;
    }

    .find-btn {
      margin-top: 36px;
      background: var(--amber);
      border: none;
      border-radius: 18px;
      padding: 17px 36px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Sora', sans-serif;
      color: #1a1a18;
      box-shadow: 0 6px 20px rgba(239,159,39,0.4);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      position: relative;
      z-index: 1;
    }

    .find-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(239,159,39,0.5);
    }

    .find-btn:active {
      transform: translateY(0);
    }

    .info-row {
      margin-top: 32px;
      display: flex;
      gap: 12px;
      position: relative;
      z-index: 1;
    }

    .info-pill {
      background: rgba(255,255,255,0.08);
      border: none;
      border-radius: 16px;
      padding: 16px 12px;
      text-align: center;
      color: #fff;
      width: 100px;
      cursor: pointer;
      -webkit-backdrop-filter: blur(6px);
      backdrop-filter: blur(6px);
      transition: background 0.2s;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .info-pill:hover {
      background: rgba(255,255,255,0.13);
    }

    .emoji {
      font-size: 22px;
    }

    .ilabel {
      margin-top: 6px;
      font-size: 11px;
      color: rgba(255,255,255,0.65);
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    /* ============================
       LOCATION MODAL
    ============================ */

    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      justify-content: center;
      align-items: center;
      z-index: 100;
      -webkit-backdrop-filter: blur(4px);
      backdrop-filter: blur(4px);
      animation: fadeIn 0.2s ease;
    }

    #modal-overlay.show {
      display: flex;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal {
      background: #fff;
      padding: 28px 24px;
      border-radius: 24px;
      width: 90%;
      max-width: 340px;
      text-align: center;
      box-shadow: 0 24px 60px rgba(0,0,0,0.2);
      animation: slideUp 0.25s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .modal-icon {
      font-size: 44px;
    }

    .modal h2 {
      margin-top: 12px;
      font-size: 20px;
      font-weight: 700;
    }

    .modal p {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .modal-btns {
      margin-top: 22px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn-allow {
      background: var(--green-dark);
      color: #fff;
      border: none;
      padding: 15px;
      border-radius: 14px;
      cursor: pointer;
      font-family: 'Sora', sans-serif;
      font-size: 15px;
      font-weight: 700;
      transition: background 0.15s;
    }

    .btn-allow:hover {
      background: var(--green-mid);
    }

    .btn-cancel {
      border: none;
      background: none;
      cursor: pointer;
      font-family: 'Sora', sans-serif;
      font-size: 14px;
      color: var(--muted);
      padding: 8px;
    }

    .btn-cancel:hover {
      color: var(--text);
    }

    /* ============================
       LOADING SCREEN
    ============================ */

    #loading {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--green-dark);
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 200;
    }

    #loading.show {
      display: flex;
    }

    .loading-brand {
      font-size: 30px;
      color: #fff;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .loading-brand-accent {
      color: var(--amber);
    }

    .spinner {
      margin-top: 24px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.15);
      border-top-color: var(--amber);
      animation: spin 0.85s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #loading p {
      color: rgba(255,255,255,0.7);
      margin-top: 16px;
      font-size: 14px;
    }

    /* ============================
       MAP SCREEN
    ============================ */

    #screen-map {
      display: none;
      flex-direction: column;
      min-height: 100vh;
    }

    .map-header {
      background: var(--green-dark);
      color: #fff;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .back-btn {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      cursor: pointer;
      font-size: 18px;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .back-btn:hover {
      background: rgba(255,255,255,0.22);
    }

    .map-brand {
      font-weight: 800;
      font-size: 18px;
      letter-spacing: -0.3px;
    }

    .map-brand span {
      color: var(--amber);
    }

    .loc-badge {
      margin-left: auto;
      background: rgba(255,255,255,0.12);
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .loc-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4ade80;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    #map {
      width: 100%;
      height: 300px;
      flex-shrink: 0;
    }

    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 16px 8px;
    }

    .results-title {
      font-weight: 700;
      font-size: 16px;
    }

    .results-count {
      background: var(--green-light);
      color: var(--green-dark);
      font-size: 12px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
    }

    #parking-list {
      padding: 4px 14px 120px;
    }

    /* ============================
       PARKING CARD
    ============================ */

    .p-card {
      background: var(--card);
      margin-bottom: 10px;
      border-radius: 18px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .p-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }

    .p-card.selected {
      border-color: var(--green);
      box-shadow: 0 4px 16px rgba(29,158,117,0.18);
    }

    .p-icon-wrap {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: var(--green-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .p-card.selected .p-icon-wrap {
      background: var(--green-dark);
    }

    .p-info {
      flex: 1;
      min-width: 0;
    }

    .p-name {
      font-weight: 700;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .p-meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .p-status {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
    }

    .status-open {
      background: #dcfce7;
      color: #166534;
    }

    .status-limited {
      background: var(--amber-light);
      color: #92400e;
    }

    .status-full {
      background: #fee2e2;
      color: #991b1b;
    }

    .p-right {
      text-align: right;
      flex-shrink: 0;
    }

    .p-dist {
      color: var(--green-dark);
      font-weight: 700;
      font-size: 14px;
    }

    .p-slots {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
    }

    /* ============================
       DIRECTIONS BUTTON
    ============================ */

    #dir-btn {
      display: none;
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--green-dark);
      color: #fff;
      border: none;
      border-radius: 40px;
      padding: 15px 32px;
      cursor: pointer;
      font-family: 'Sora', sans-serif;
      font-size: 15px;
      font-weight: 700;
      box-shadow: 0 8px 24px rgba(8,80,65,0.4);
      white-space: nowrap;
      transition: transform 0.15s, box-shadow 0.15s;
      z-index: 60;
    }

    #dir-btn.visible {
      display: block;
      animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes popIn {
      from { transform: translateX(-50%) scale(0.8); opacity: 0; }
      to { transform: translateX(-50%) scale(1); opacity: 1; }
    }

    #dir-btn:hover {
      transform: translateX(-50%) translateY(-2px);
      box-shadow: 0 12px 30px rgba(8,80,65,0.5);
    }

    /* ============================
       ERROR TOAST
    ============================ */

    #error-toast {
      display: none;
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--red);
      color: #fff;
      padding: 14px 20px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 6px 20px rgba(229,62,62,0.35);
      z-index: 300;
      white-space: nowrap;
      animation: slideUpToast 0.2s ease;
    }

    @keyframes slideUpToast {
      from { transform: translateX(-50%) translateY(10px); opacity: 0; }
      to { transform: translateX(-50%) translateY(0); opacity: 1; }
    }

    /* ============================
       EMPTY STATE
    ============================ */

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }

    .empty-state .emoji-big {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .empty-state p {
      font-size: 14px;
    }
  </style>
</head>

<body>

  <!-- ========================
       HOME SCREEN
  ========================= -->

  <div id="screen-home">

    <div class="home-logo">🅿️</div>

    <div class="home-brand">Smart<span>Parking</span></div>

    <div class="home-sub">Find nearby parking areas instantly</div>

    <button class="find-btn" onclick="askPermission()">
      📍 Find Parking Near Me
    </button>

    <div class="info-row">

      <button class="info-pill" type="button" onclick="activateLiveGPS()">
        <div class="emoji">📍</div>
        <div class="ilabel">Live GPS</div>
      </button>

      <button class="info-pill" type="button" onclick="activateMapView()">
        <div class="emoji">🗺️</div>
        <div class="ilabel">Map View</div>
      </button>

      <button class="info-pill" type="button" onclick="activateDirections()">
        <div class="emoji">🧭</div>
        <div class="ilabel">Directions</div>
      </button>

    </div>

  </div>

  <!-- ========================
       LOCATION MODAL
  ========================= -->

  <div id="modal-overlay">
    <div class="modal">

      <div class="modal-icon">📍</div>

      <h2>Allow Location Access?</h2>

      <p>
        SmartPark needs your location to find
        nearby parking areas on the map.
      </p>

      <div class="modal-btns">

        <button class="btn-allow" onclick="getLocation()">
          ✅ Allow Location
        </button>

        <button class="btn-cancel" onclick="closeModal()">
          Maybe Later
        </button>

      </div>

    </div>
  </div>

  <!-- ========================
       LOADING SCREEN
  ========================= -->

  <div id="loading">
    <div class="loading-brand">
      Smart<span class="loading-brand-accent">Park</span>
    </div>
    <div class="spinner"></div>
    <p id="loading-text">Finding nearby parking...</p>
  </div>

  <!-- ========================
       MAP SCREEN
  ========================= -->

  <div id="screen-map">

    <div class="map-header">
      <button class="back-btn" onclick="goHome()">←</button>
      <div class="map-brand">Smart<span>Park</span></div>
      <div class="loc-badge">
        <div class="loc-dot"></div>
        Live
      </div>
    </div>

    <div id="map"></div>

    <div class="results-header">
      <div class="results-title">Nearby Parking</div>
      <div class="results-count" id="results-count"></div>
    </div>

    <div id="parking-list"></div>

  </div>

  <!-- DIRECTIONS BUTTON -->
  <button id="dir-btn" onclick="openDirections()">
    🗺️ Get Directions
  </button>

  <!-- ERROR TOAST -->
  <div id="error-toast"></div>


  <script>

    let map;
    let userLat;
    let userLng;
    let selectedSpot = null;
    let currentSpots = [];
    let markers = [];

    /* ===== PERMISSION MODAL ===== */

    function askPermission() {
      document.getElementById("modal-overlay").classList.add("show");
    }

    function closeModal() {
      document.getElementById("modal-overlay").classList.remove("show");
    }

    /* ===== LOADING ===== */

    function showLoading(message) {
      document.getElementById("loading-text").textContent = message;
      document.getElementById("loading").classList.add("show");
    }

    function hideLoading() {
      document.getElementById("loading").classList.remove("show");
    }

    /* ===== ERROR TOAST ===== */

    function showError(message) {
      const toast = document.getElementById("error-toast");
      toast.textContent = "⚠️ " + message;
      toast.style.display = "block";
      setTimeout(() => { toast.style.display = "none"; }, 5000);
    }

    /* ===== GEOLOCATION — THE FIXED VERSION ===== */

    function getLocation() {
      closeModal();

      // Check if geolocation is supported at all
      if (!navigator.geolocation) {
        showError("Your browser does not support geolocation.");
        return;
      }

      showLoading("Getting your location...");

      navigator.geolocation.getCurrentPosition(

        async (position) => {
          userLat = position.coords.latitude;
          userLng = position.coords.longitude;

          showLoading("Finding parking areas...");

          try {
            const response = await fetch(
              `/api/parking?lat=${userLat}&lng=${userLng}`
            );

            const data = await response.json();

            if (!response.ok) {
              throw new Error(data.error || "Server error " + response.status);
            }

            currentSpots = data.spots;
            hideLoading();
            showMapScreen(data.spots);

          } catch (err) {
            hideLoading();
            showError("Could not load parking data. Please try again.");
            console.error(err);
          }
        },

        (error) => {
          hideLoading();

          // Detailed error messages so you know exactly what's wrong
          switch (error.code) {
            case error.PERMISSION_DENIED:
              showError("Location access denied. Please allow location in browser settings.");
              break;
            case error.POSITION_UNAVAILABLE:
              showError("Location unavailable. Make sure GPS is enabled.");
              break;
            case error.TIMEOUT:
              showError("Location request timed out. Please try again.");
              break;
            default:
              showError("Location error: " + error.message);
          }
        },

        {
          enableHighAccuracy: true,
          timeout: 15000,       // wait up to 15 seconds
          maximumAge: 0         // always get a fresh position
        }
      );
    }

    /* ===== HELPERS ===== */

    function formatDistance(meters) {
      if (meters < 1000) return meters + " m";
      return (meters / 1000).toFixed(1) + " km";
    }

    function statusLabel(status) {
      const map = {
        open: '<span class="p-status status-open">Open</span>',
        limited: '<span class="p-status status-limited">Limited</span>',
        full: '<span class="p-status status-full">Full</span>',
      };
      return map[status] || '';
    }

    function formatDuration(meters) {
      const minutes = Math.max(1, Math.ceil(meters / 300));
      if (minutes < 60) {
        return minutes + " min";
      }
      const hours = Math.floor(minutes / 60);
      const remainder = minutes % 60;
      return hours + "h" + (remainder ? ` ${remainder}m` : "");
    }

    function activateLiveGPS() {
      if (navigator.geolocation && userLat && userLng) {
        getLocation();
      } else {
        askPermission();
      }
    }

    function activateMapView() {
      if (!userLat || !userLng) {
        askPermission();
        return;
      }
      if (!currentSpots.length) {
        showError("Get Live GPS first to load nearby parking.");
        return;
      }
      showMapScreen(currentSpots);
    }

    function activateDirections() {
      if (!selectedSpot) {
        showError("Select a parking spot first to get directions.");
        return;
      }
      openDirections();
    }

    /* ===== MAP SCREEN ===== */

    function showMapScreen(spots) {

      document.getElementById("screen-home").style.display = "none";
      document.getElementById("screen-map").style.display = "flex";

      // Init or reuse map
      if (!map) {
        map = L.map("map").setView([userLat, userLng], 15);
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          maxZoom: 19,
          attribution: '© OpenStreetMap'
        }).addTo(map);
      } else {
        map.setView([userLat, userLng], 15);
        // Clear old markers
        markers.forEach(m => m.remove());
        markers = [];
      }

      // User marker
      const userIcon = L.divIcon({
        html: `<div style="
          width:16px;height:16px;
          background:#085041;
          border:3px solid #fff;
          border-radius:50%;
          box-shadow:0 2px 6px rgba(0,0,0,0.3);
        "></div>`,
        className: '',
        iconAnchor: [8, 8]
      });

      const userMarker = L.marker([userLat, userLng], { icon: userIcon })
        .addTo(map)
        .bindPopup("<b>📍 You are here</b>");
      markers.push(userMarker);

      // Parking markers
      const parkIcon = L.divIcon({
        html: `<div style="
          width:30px;height:30px;
          background:#EF9F27;
          border:3px solid #fff;
          border-radius:8px;
          display:flex;align-items:center;justify-content:center;
          font-size:14px;
          box-shadow:0 2px 8px rgba(0,0,0,0.25);
        ">🅿</div>`,
        className: '',
        iconAnchor: [15, 15]
      });

      const list = document.getElementById("parking-list");
      list.innerHTML = "";

      document.getElementById("results-count").textContent =
        spots.length + " spot" + (spots.length !== 1 ? "s" : "");

      if (spots.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="emoji-big">🔍</div>
            <p>No parking spots found nearby.</p>
          </div>`;
        return;
      }

      spots.forEach((spot) => {

        // Map marker
        const marker = L.marker([spot.lat, spot.lng], { icon: parkIcon })
          .addTo(map)
          .bindPopup(`<b>${spot.name}</b><br>${spot.slots} slots`);
        markers.push(marker);
        spot.marker = marker;

        // List card
        const card = document.createElement("div");
        card.className = "p-card";
        card.innerHTML = `
          <div class="p-icon-wrap">🅿️</div>
          <div class="p-info">
            <div class="p-name">${spot.name}</div>
            <div class="p-meta">
              ${statusLabel(spot.status)}
              <span>${spot.slots} slots</span>
            </div>
          </div>
          <div class="p-right">
            <div class="p-dist">${formatDistance(spot.distance)}</div>
            <div class="p-slots">${formatDuration(spot.distance)}</div>
          </div>
        `;

        card.addEventListener("click", () => selectSpot(spot, card));
        list.appendChild(card);
      });
    }

    /* ===== SELECT SPOT ===== */

    function selectSpot(spot, card) {
      document.querySelectorAll(".p-card")
        .forEach(c => c.classList.remove("selected"));

      card.classList.add("selected");
      selectedSpot = spot;

      map.flyTo([spot.lat, spot.lng], 16, { duration: 1 });
      spot.marker.openPopup();

      document.getElementById("dir-btn").classList.add("visible");
    }

    /* ===== DIRECTIONS ===== */

    function openDirections() {
      if (!selectedSpot) return;
      window.open(
        `https://www.google.com/maps/dir/${userLat},${userLng}/${selectedSpot.lat},${selectedSpot.lng}`,
        "_blank"
      );
    }

    /* ===== GO HOME ===== */

    function goHome() {
      document.getElementById("screen-map").style.display = "none";
      document.getElementById("screen-home").style.display = "flex";
      document.getElementById("dir-btn").classList.remove("visible");
      selectedSpot = null;
    }

  </script>

</body>
</html>
